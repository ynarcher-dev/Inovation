<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>기업 상세 관리</title>
    <link rel="stylesheet" href="/src/styles.css">
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">관리자</div>
        <nav class="nav">
          <a href="/admin/dashboard.html">대시보드</a>
          <a href="/admin/expense-requests.html">신청 목록</a>
          <button data-logout type="button">로그아웃</button>
        </nav>
      </aside>
      <main class="main">
        <div class="topbar">
          <div>
            <h1 data-company-name>기업 상세 관리</h1>
            <p class="muted">사업계획서, 비목별 잔액, 지출 이력, 보완 히스토리를 확인합니다.</p>
          </div>
        </div>
        <p class="error" data-error hidden></p>
        <section class="grid grid-3">
          <div class="card metric"><span>대표자</span><strong data-representative>-</strong></div>
          <div class="card metric"><span>사업자등록번호</span><strong data-business-number>-</strong></div>
          <div class="card metric"><span>승인 상태</span><strong data-approval-status>-</strong></div>
          <div class="card metric"><span>총 지원금</span><strong data-support-total>-</strong></div>
        </section>
        <section class="grid grid-2" style="margin-top:16px">
          <div class="card">
            <h2>최종 사업계획서</h2>
            <p><strong>버전</strong> <span data-business-plan-version>-</span></p>
            <p><strong>파일</strong> <span data-business-plan-file>-</span></p>
            <p><strong>승인일</strong> <span data-business-plan-approved>-</span></p>
            <p class="muted">MVP에서는 업로드 UI 대신 최종 승인본 기준 정보를 표시합니다.</p>
          </div>
          <div class="card">
            <h2>관리자 메모</h2>
            <textarea placeholder="기업별 관리 메모를 입력합니다. MVP에서는 저장하지 않습니다."></textarea>
          </div>
        </section>
        <section class="card" style="margin-top:16px">
          <h2>사업계획서 항목 및 비목별 잔액</h2>
          <div data-budget-table></div>
        </section>
        <section class="card" style="margin-top:16px">
          <h2>지출 신청 이력</h2>
          <div data-expense-table></div>
        </section>
        <section class="card" style="margin-top:16px">
          <h2>서류 보완/반려 히스토리</h2>
          <div data-review-history></div>
        </section>
      </main>
    </div>
    <script type="module" src="/src/pages/adminCompanyDetail.js"></script>
  </body>
</html>
