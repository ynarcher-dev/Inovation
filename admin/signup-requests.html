<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>가입 신청 관리</title>
    <link rel="stylesheet" href="../src/styles.css">
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar"></aside>
      <main class="main">
        <div class="topbar">
          <div>
            <h1>가입 신청 관리</h1>
            <p class="muted">창업자 가입 신청 기업을 승인하거나 반려합니다.</p>
          </div>
        </div>
        <p class="error" data-error hidden></p>
        <section class="card">
          <h2>승인 대기</h2>
          <div data-pending-signups></div>
        </section>
        <section class="card" style="margin-top:16px">
          <h2>전체 가입 기업</h2>
          <div data-signup-toolbar></div>
          <div data-all-signups></div>
        </section>
      </main>
    </div>
    <script type="module" src="../src/pages/admin/signup-requests.js"></script>
  </body>
</html>
