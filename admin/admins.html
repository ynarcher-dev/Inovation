<!doctype html>
<html lang="ko">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>관리자 계정 관리</title>
  <link rel="stylesheet" href="../src/styles.css">
  <style>
    .admin-list-rows { display: flex; flex-direction: column; gap: 8px; }
    .admin-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
    }
    .admin-row .admin-name { font-weight: 700; flex: 0 0 auto; }
    .admin-row .admin-email { flex: 0 0 auto; }
    .admin-row .admin-programs { flex: 1 1 auto; display: flex; flex-wrap: wrap; gap: 4px; }
    .admin-row .admin-actions { margin-left: auto; display: flex; gap: 6px; flex: 0 0 auto; }
    .admin-chip {
      background: #f1f5f9;
      color: #475569;
      border-radius: 9999px;
      padding: 2px 10px;
      font-size: var(--text-caption);
      font-weight: 600;
    }
    @media (max-width: 720px) {
      .admin-row { flex-wrap: wrap; }
      .admin-row .admin-actions { margin-left: 0; }
    }
  </style>
</head>

<body>
  <div class="app-shell">
    <aside class="sidebar"></aside>
    <main class="main">
      <div class="topbar">
        <div>
          <h1>관리자 계정 관리</h1>
          <p class="muted">관리자 계정을 추가합니다. 삭제·비밀번호 초기화·사업 권한 배정은 슈퍼관리자만 가능합니다.</p>
        </div>
      </div>
      <p class="error" data-error hidden></p>
      <section class="card">
        <h2>관리자 추가</h2>
        <p class="muted">추가되는 계정의 권한은 일반 관리자(admin)입니다.</p>
        <form class="form" data-admin-create-form>
          <div class="field">
            <label for="admin-name">이름</label>
            <input id="admin-name" required>
          </div>
          <div class="field">
            <label for="admin-email">로그인 이메일</label>
            <input id="admin-email" type="email" autocomplete="off" placeholder="name@example.com" required>
          </div>
          <div class="field">
            <label for="admin-password">초기 비밀번호</label>
            <input id="admin-password" type="password" autocomplete="new-password" minlength="6" required>
          </div>
          <div class="actions">
            <button class="button" type="submit">추가</button>
          </div>
        </form>
      </section>
      <section class="card" style="margin-top:16px">
        <h2>관리자 목록</h2>
        <div data-admin-list></div>
      </section>
    </main>
  </div>
  <script type="module" src="../src/pages/admin/admins.js"></script>
</body>

</html>
