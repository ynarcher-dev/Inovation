<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>규정 및 유의사항 관리</title>
    <link rel="stylesheet" href="/src/styles.css">
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">관리자</div>
        <nav class="nav">
          <a href="/admin/dashboard.html">대시보드</a>
          <a href="/admin/signup-requests.html">가입 신청 관리</a>
          <a href="/admin/support-programs.html">참가 사업명 관리</a>
          <a class="active" href="/admin/guidance-items.html">규정 및 유의사항</a>
          <a href="/admin/expense-requests.html">신청 목록</a>
          <button data-logout type="button">로그아웃</button>
        </nav>
      </aside>
      <main class="main">
        <div class="topbar">
          <div>
            <h1>규정 및 유의사항 관리</h1>
            <p class="muted">창업자 대시보드에 공통으로 표시할 규정, 안내, 링크를 관리합니다.</p>
          </div>
        </div>
        <p class="error" data-error hidden></p>
        <section class="card">
          <h2>항목 추가</h2>
          <form class="form" data-guidance-form>
            <div class="grid grid-3">
              <div class="field">
                <label for="guidance-title">제목</label>
                <input id="guidance-title" required>
              </div>
              <div class="field">
                <label for="guidance-link">링크</label>
                <input id="guidance-link" placeholder="/docs/... 또는 https://...">
              </div>
              <div class="field">
                <label for="guidance-sort">순서</label>
                <input id="guidance-sort" type="number" value="0">
              </div>
            </div>
            <div class="field">
              <label for="guidance-content">내용</label>
              <textarea id="guidance-content" placeholder="창업자 대시보드에 함께 표시할 안내 문구를 입력합니다."></textarea>
            </div>
            <div class="actions">
              <button class="button" type="submit">추가</button>
            </div>
          </form>
        </section>
        <section class="card" style="margin-top:16px">
          <h2>등록된 규정 및 유의사항</h2>
          <div data-guidance-list></div>
        </section>
      </main>
    </div>
    <script type="module" src="/src/pages/adminGuidanceItems.js"></script>
  </body>
</html>
