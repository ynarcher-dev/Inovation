<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>규정 및 유의사항 관리</title>
    <link rel="stylesheet" href="../src/styles.css">
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">관리자</div>
        <nav class="nav">
          <a href="./dashboard.html">대시보드</a>
          <a href="./signup-requests.html">가입 신청 관리</a>
          <a href="./support-programs.html">참가 사업명 관리</a>
          <a href="./program-management.html">참가 사업 관리</a>
          <a class="active" href="./guidance-items.html">규정 및 유의사항</a>
          <a href="./companies.html">기업 목록</a>
          <button data-logout type="button">로그아웃</button>
        </nav>
      </aside>
      <main class="main">
        <div class="topbar">
          <div>
            <h1>규정 및 유의사항 관리</h1>
            <p class="muted">창업자 대시보드에 공통으로 표시할 규정, 안내, 링크를 관리합니다.</p>
          </div>
        </div>
        <p class="error" data-error hidden></p>
        <section class="card">
          <h2>항목 추가</h2>
          <form class="form" data-guidance-form>
            <div class="grid grid-2">
              <div class="field">
                <label for="guidance-title">제목</label>
                <input id="guidance-title" required>
              </div>
              <div class="field">
                <label for="guidance-file">첨부 파일</label>
                <input id="guidance-file" type="file">
              </div>
            </div>
            <div class="actions">
              <button class="button" type="submit">추가</button>
            </div>
          </form>
        </section>
        <section class="card" style="margin-top:16px">
          <h2>등록된 규정 및 유의사항</h2>
          <div data-guidance-list></div>
        </section>
      </main>
    </div>
    <script type="module" src="../src/pages/adminGuidanceItems.js"></script>
  </body>
</html>
