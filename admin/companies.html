<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>기업 목록</title>
    <link rel="stylesheet" href="../src/styles.css">
    <style>
      /* 컬럼이 많아 표를 조밀하게(전체 폭은 .main 전역 설정 사용, 넘칠 때만 가로 스크롤) */
      [data-company-table] table { table-layout: auto; width: 100%; }
      [data-company-table] th,
      [data-company-table] td {
        padding: 12px 14px;
        font-size: var(--text-sm);
      }
    </style>
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar"></aside>
      <main class="main">
        <div class="topbar">
          <div>
            <h1>기업 목록</h1>
            <p class="muted">등록된 창업 기업의 예산 사용 현황을 확인하고 상세 관리 페이지로 진입할 수 있습니다.</p>
          </div>
        </div>
        <p class="error" data-error hidden></p>
        <section class="card">
          <div data-company-toolbar></div>
          <div data-company-table></div>
        </section>
      </main>
    </div>
    <script type="module" src="../src/pages/admin/companies.js"></script>
  </body>
</html>
