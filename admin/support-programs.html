<!doctype html>
<html lang="ko">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>신규사업 관리</title>
  <link rel="stylesheet" href="../src/styles.css">
</head>

<body>
  <div class="app-shell">
    <aside class="sidebar"></aside>
    <main class="main">
      <div class="topbar">
        <div>
          <h1>신규사업 관리</h1>
          <p class="muted">창업자 가입 화면에 표시할 신규사업을 관리합니다.</p>
        </div>
      </div>
      <p class="error" data-error hidden></p>
      <section class="card">
        <h2>신규사업 추가</h2>
        <p class="muted">사업 코드는 저장 시 자동 생성되며 수정할 수 없습니다.</p>
        <form class="form" data-support-program-form>
          <div class="field">
            <label for="support-program-name">신규사업명</label>
            <input id="support-program-name" required>
            <label for="support-program-code-preview" hidden>사업코드</label>
            <input id="support-program-code-preview" value="저장 후 자동 생성" hidden>
          </div>
          <div class="actions">
            <button class="button" type="submit">추가</button>
          </div>
        </form>
      </section>
      <section class="card" style="margin-top:16px">
        <h2>등록된 신규사업</h2>
        <div data-support-program-list></div>
      </section>
    </main>
  </div>
  <script type="module" src="../src/pages/admin/support-programs.js"></script>
</body>

</html>
