<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>관리자 신청 상세</title>
    <link rel="stylesheet" href="../src/styles.css">
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar"></aside>
      <main class="main">
        <div class="topbar">
          <div>
            <h1 data-title>신청 상세</h1>
            <p data-status></p>
          </div>
        </div>
        <p class="error" data-error hidden></p>
        <div class="detail-layout">
          <div class="detail-main">
            <section class="card">
              <h2>신청 정보</h2>
              <div data-summary></div>
            </section>
            <section class="card">
              <h2>검토 요약</h2>
              <div data-budget-check></div>
              <div data-warnings class="budget-warnings"></div>
            </section>
            <section class="card">
              <h2 data-review-title>검토 처리</h2>
              <p class="empty" data-review-empty hidden>현재 검토 대상 상태가 아닙니다.</p>
              <form class="form" data-review-form>
                <div class="field">
                  <label for="comment">검토 의견</label>
                  <textarea id="comment" placeholder="승인/보완요청 사유를 입력하세요."></textarea>
                </div>
                <div class="actions">
                  <button class="button" name="decision" value="approved" type="submit">승인</button>
                  <button class="button secondary" name="decision" value="revision_requested" type="submit">보완요청</button>
                </div>
                <p class="muted" style="font-size:var(--text-caption); margin-top:6px;">보완 요청 시 신청자는 같은 건을 수정해 다시 제출합니다.</p>
              </form>
            </section>
          </div>
          <div class="detail-side">
            <aside class="card">
              <h2>제출 서류 <span class="muted" style="font-size:12px;" data-doc-rate></span></h2>
              <div data-checklist></div>
              <div data-advance-docs></div>
              <div data-other-evidence-docs></div>
              <h2>AI 분석 <span class="muted" style="font-size:12px">(참고용)</span></h2>
              <div data-ai></div>
              <h2>검토 이력</h2>
              <div data-reviews></div>
            </aside>
          </div>
        </div>
      </main>
    </div>
    <script type="module" src="../src/pages/admin/expense-detail.js"></script>
  </body>
</html>
