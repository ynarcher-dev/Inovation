<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>관리자 대시보드</title>
    <link rel="stylesheet" href="../src/styles.css">
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">관리자</div>
        <nav class="nav">
          <a class="active" href="./dashboard.html">대시보드</a>
          <a href="./signup-requests.html">가입 신청 관리</a>
          <a href="./support-programs.html">참가 사업명 관리</a>

      </aside>
      <main class="main">
        <div class="topbar">
          <div>
            <h1>관리자 대시보드</h1>
            <p class="muted"><span data-user-name></span> 관리자 계정입니다.</p>

        <section style="margin-top:16px">

          <div class="grid grid-4" data-stats-section></div>

          <h2>가입 승인</h2>
          <div data-signup-approval-section></div>
        </section>

        <section class="card" style="margin-top:16px">
          <h2>예산 사용 승인</h2>
          <div data-expense-approval-section></div>

          <div data-budget-approval-section></div>
