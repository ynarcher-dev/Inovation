<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>프로필 | 사업비 집행 도우미</title>
    <link rel="stylesheet" href="../src/styles.css">
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar"></aside>
      <main class="main">
        <div class="topbar">
          <div>
            <h1>프로필</h1>

          </div>
          <a class="button secondary" href="./dashboard.html">대시보드로 돌아가기</a>
        </div>
        <p class="error" data-error hidden></p>

        <div class="card profile-card">
          <header class="profile-head">
            <div class="profile-avatar" data-account-avatar>-</div>
            <div class="profile-identity">
              <h2 data-company-name>-</h2>
              <p class="muted" data-account-subtitle>-</p>
            </div>
            <span class="badge" data-account-status>-</span>
          </header>

          <div class="profile-info">
            <section class="profile-info-group">
              <h3 class="profile-info-title">기본 정보</h3>
              <dl class="summary-list summary-list--wide">
                <div class="summary-row">
                  <dt>기업명</dt>
                  <dd data-company-name-value>-</dd>
                </div>
                <div class="summary-row">
                  <dt>대표자명</dt>
                  <dd data-representative-name>-</dd>
                </div>
                <div class="summary-row">
                  <dt>사업자등록번호</dt>
                  <dd data-business-number>-</dd>
                </div>
                <div class="summary-row">
                  <dt>연락처</dt>
                  <dd data-phone>-</dd>
                </div>
              </dl>
            </section>

            <section class="profile-info-group">
              <h3 class="profile-info-title">계정 정보</h3>
              <dl class="summary-list summary-list--wide">
                <div class="summary-row">
                  <dt>이메일</dt>
                  <dd data-account-email>-</dd>
                </div>
                <div class="summary-row">
                  <dt>권한</dt>
                  <dd data-account-role>-</dd>
                </div>
                <div class="summary-row">
                  <dt>가입 승인 상태</dt>
                  <dd><span class="badge" data-account-status-inline>-</span></dd>
                </div>
                <div class="summary-row">
                  <dt>가입일</dt>
                  <dd data-account-joined>-</dd>
                </div>
              </dl>
            </section>
          </div>
        </div>

        <div class="profile-manage">
          <section class="card">
            <h2>비밀번호 변경</h2>

            <form class="form" id="password-form">
              <div class="field">
                <label for="current_password">현재 비밀번호</label>
                <input id="current_password" type="password" autocomplete="current-password" required>
              </div>
              <div class="field">
                <label for="new_password">새 비밀번호</label>
                <input id="new_password" type="password" autocomplete="new-password" minlength="6" required>
              </div>
              <div class="field">
                <label for="new_password_confirm">새 비밀번호 확인</label>
                <input id="new_password_confirm" type="password" autocomplete="new-password" minlength="6" required>
              </div>
              <div class="actions">
                <button class="button" type="submit">비밀번호 변경</button>
              </div>
            </form>
          </section>

          <section class="card account-danger">
            <h2>회원 탈퇴</h2>

            <div class="account-danger-row">
              <p>탈퇴를 진행하려면 확인 문구 입력과 비밀번호 확인이 필요합니다.</p>
              <button class="button danger" type="button" data-withdraw>회원 탈퇴</button>
            </div>
          </section>
        </div>
      </main>
    </div>
    <script type="module" src="../src/pages/founder/profile.js"></script>
  </body>
</html>
