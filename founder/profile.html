<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>프로필 | 사업비 집행 도우미</title>
    <link rel="stylesheet" href="../src/styles.css">
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">사업비 집행 도우미</div>
        <nav class="nav">
          <a href="./dashboard.html">대시보드</a>
          <a class="active" href="./profile.html">프로필</a>
          <button data-logout type="button">로그아웃</button>
        </nav>
      </aside>
      <main class="main">
        <div class="topbar">
          <div>
            <h1>프로필</h1>
            <p class="muted">대표자와 기업 기본정보를 관리합니다.</p>
          </div>
          <a class="button secondary" href="./dashboard.html">대시보드로 돌아가기</a>
        </div>
        <p class="error" data-error hidden></p>
        <p class="notice" data-result hidden></p>

        <section class="profile-section">
          <form class="card form" id="profile-form">
            <h2>기본 정보</h2>
            <div class="field">
              <label for="company_name">기업명</label>
              <input id="company_name" required>
            </div>
            <div class="field">
              <label for="representative_name">대표자명</label>
              <input id="representative_name" required>
            </div>
            <div class="field">
              <label for="business_number">사업자등록번호</label>
              <input id="business_number" placeholder="000-00-00000">
            </div>
            <div class="field">
              <label for="phone">연락처</label>
              <input id="phone" autocomplete="tel">
            </div>
            <div class="actions">
              <button class="button" type="submit">저장</button>
            </div>
          </form>
        </section>
      </main>
    </div>
    <script type="module" src="../src/pages/founderProfile.js"></script>
  </body>
</html>
