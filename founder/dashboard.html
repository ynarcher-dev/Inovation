<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>창업자 대시보드</title>
    <link rel="stylesheet" href="../src/styles.css">
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar"></aside>
      <main class="main">
        <div class="topbar">
          <div>
            <h1>창업자 대시보드</h1>
            <p class="muted"><span data-user-name></span>님의 사업비 진행 현황입니다.</p>
          </div>
          <a class="button" data-new-expense-link href="./expense-new.html">새 지출 신청</a>
        </div>
        <p class="error" data-error hidden></p>
        <div class="notice" data-approval-notice hidden></div>
        <section class="grid grid-4 info-metrics" style="margin-bottom: 16px;">
          <div class="card metric"><span>기업 정보</span><strong data-company-name>-</strong><span data-representative class="muted caption"></span></div>
          <div class="card metric"><span>참가 사업</span><strong data-support-program>-</strong><span data-agreement class="muted caption"></span></div>
          <div class="card metric"><span>지원금 집행현황</span><strong><span data-approved-total>-</span> / <span data-support-total>-</span></strong><span data-execution-rate class="muted caption">0% 집행</span></div>
          <div class="card metric bp-card">
            <span>사업 계획서</span>
            <!-- 1차 사업계획서 슬롯: 조회/다운로드 전용 (첨부/수정은 예산 관리 화면에서) -->
            <div class="bp-slot" data-bp-slot="round1">
              <span class="bp-slot-label">1차</span>
              <div class="bp-slot-body">
                <strong data-bp-name="round1" data-bp-download="round1">예산 배정 후 반영됩니다.</strong>
                <span data-bp-updated="round1" class="muted caption"></span>
              </div>
            </div>
            <!-- 2차 사업계획서 슬롯: 조회/다운로드 전용 -->
            <div class="bp-slot bp-slot-disabled" data-bp-slot="round2">
              <span class="bp-slot-label">2차</span>
              <div class="bp-slot-body">
                <strong data-bp-name="round2" data-bp-download="round2">예산 배정 후 반영됩니다.</strong>
                <span data-bp-updated="round2" class="muted caption"></span>
              </div>
            </div>
          </div>
        </section>
        <!-- Tabs Navigation -->
        <div class="tabs-nav">
          <button class="tab-button active" data-tab="tab-expense" type="button">지출 현황</button>
          <button class="tab-button" data-tab="tab-budget" type="button">예산 관리</button>
          <button class="tab-button" data-tab="tab-budget-history" type="button">예산 히스토리</button>
          <button class="tab-button" data-tab="tab-overview" type="button">사업개요 및 첨부파일</button>
        </div>

        <!-- Tab 1: 지출 현황 -->
        <div id="tab-expense" class="tab-content active">
          <!-- 8단계 상태 요약 칩 (클릭 시 해당 상태로 필터) -->
          <div class="status-chip-bar" data-status-chips></div>
          <section class="card">
            <h2>지출 현황</h2>

            <!-- 검색 / 결재 구간 필터 toolbar -->
            <div class="expense-toolbar">
              <input type="search" class="expense-search" data-expense-search
                placeholder="신청명·비목·거래처·상태명 검색" aria-label="지출 검색">
              <select class="expense-segment" data-expense-segment aria-label="결재 구간 필터"></select>
              <span class="expense-filter-info muted caption" data-expense-filter-info></span>
            </div>
            <div data-expense-table></div>
          </section>
        </div>

        <!-- Tab 2: 예산 관리 -->
        <div id="tab-budget" class="tab-content">
          <!-- Before Application: Empty card with Apply button -->
          <div class="card" id="budget-empty-card" style="text-align: center; padding: 40px 20px;">
            <h3 style="margin-bottom: 8px;">예산 및 비목 등록</h3>
            <p class="muted" style="max-width: 500px; margin: 0 auto 20px;">
              지출 신청을 진행하기 전에, 참가 사업의 비목별 예산 계획을 등록해 주세요.<br>
              등록하신 예산안은 관리자의 승인을 거쳐 확정됩니다.
            </p>
            <button class="button" id="start-budget-btn" type="button">예산 신청</button>
          </div>

          <!-- Editing or Submitted/Approved: Hierarchical budget tree -->
          <div id="budget-tree-container" hidden>
            <section class="card">
              <h2 id="budget-tree-title">예산 현황</h2>

              <form id="budget-form">
                <div data-budget-tree></div>
              </form>
            </section>
          </div>
        </div>

        <!-- Tab 3: 예산 히스토리 -->
        <div id="tab-budget-history" class="tab-content">
          <section class="card">
            <h2>예산 히스토리</h2>

            <div data-budget-history></div>
          </section>
        </div>

        <!-- Tab 4: 사업개요 및 첨부파일 -->
        <div id="tab-overview" class="tab-content">
          <section class="card">
            <h2>사업 개요</h2>

            <p data-program-description style="white-space: pre-line;">-</p>
          </section>
          <section class="card" style="margin-top: 16px;">
            <h2>첨부파일</h2>

            <div data-program-attachments></div>
          </section>
        </div>

      </main>
    </div>
    <script type="module" src="../src/pages/founder/dashboard.js"></script>
  </body>
</html>
