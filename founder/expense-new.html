<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>새 지출 신청</title>
    <link rel="stylesheet" href="../src/styles.css">
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">사업비 집행 도우미</div>
        <nav class="nav">
          <a href="./dashboard.html">대시보드</a>
          <a href="./profile.html">프로필</a>
          <button data-logout type="button">로그아웃</button>
        </nav>
      </aside>
      <main class="main">
        <div class="topbar">
          <div>
            <h1>새 지출 신청</h1>
            <p class="muted">입력값에 따라 필수서류와 위험 항목을 자동 계산합니다.</p>
          </div>
        </div>
        <p class="error" data-error hidden></p>
        <div class="detail-layout">
          <section class="card">
            <form class="form" id="expense-form">
              <div class="field">
                <label for="title">지출 제목</label>
                <input id="title" required value="홈페이지 개발 외주">
              </div>
              <div class="field">
                <label for="business_plan_item_id">사업계획서 항목</label>
                <select id="business_plan_item_id"></select>
                <p class="muted">최종 승인된 사업계획서 항목 범위 안에서만 지출을 신청합니다.</p>
              </div>
              <div class="field">
                <label for="expense_type">지출 유형</label>
                <select id="expense_type" required></select>
                <p class="muted">선택한 사업계획서 항목의 비목에 맞는 유형만 표시됩니다.</p>
              </div>
              <div class="card" style="background: var(--surface-muted);">
                <p class="muted" style="margin-top:0">자동 설정 비목</p>
                <h2 data-budget-category>일반용역비</h2>
                <p class="muted" data-budget-reason>외부 업체가 과업을 수행하고 결과물을 납품하는 지출입니다.</p>
              </div>
              <div class="grid grid-2">
                <div class="field">
                  <label for="amount_supply">공급가액</label>
                  <input id="amount_supply" inputmode="numeric" data-money-input value="5,500,000">
                </div>
                <div class="field">
                  <label for="vat_amount">부가세</label>
                  <input id="vat_amount" inputmode="numeric" data-money-input value="550,000">
                </div>
              </div>
              <div class="grid grid-2">
                <div class="field">
                  <label for="vendor_name">거래처명</label>
                  <input id="vendor_name" value="웹스튜디오 예시">
                </div>
                <div class="field">
                  <label for="vendor_business_number">거래처 사업자등록번호</label>
                  <input id="vendor_business_number" placeholder="000-00-00000">
                </div>
              </div>
              <div class="field">
                <label for="expected_completion_date">완료 예정일</label>
                <input id="expected_completion_date" type="date">
              </div>
              <div class="field">
                <label for="purpose">신청 내용</label>
                <textarea id="purpose">시제품 홍보용 홈페이지 개발</textarea>
              </div>
              <label class="checkbox-field" for="advance_payment_requested">
                <input id="advance_payment_requested" type="checkbox">
                <span>선금 신청</span>
              </label>
              <button class="button" type="submit">임시저장 후 상세로 이동</button>
            </form>
          </section>
          <aside class="grid">
            <section class="card ai-panel">
              <h2>위험 경고</h2>
              <div data-warnings></div>
            </section>
            <section class="card">
              <h2>필수서류</h2>
              <div data-checklist></div>
            </section>
          </aside>
        </div>
      </main>
    </div>
    <script type="module" src="../src/pages/expenseNew.js"></script>
  </body>
</html>
