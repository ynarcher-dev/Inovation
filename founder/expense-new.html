<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>새 지출 신청</title>
    <link rel="stylesheet" href="../src/styles.css">
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar"></aside>
      <main class="main">
        <div class="topbar">
          <div>
            <h1 data-page-title>새 지출 신청</h1>
            <p class="muted" data-page-desc>임시저장 후 언제든 수정할 수 있으며, 사전승인 신청을 누르면 관리자 검토가 시작됩니다.</p>
          </div>
        </div>
        <p class="error" data-error hidden></p>
        <div class="detail-layout">
          <section class="card">
            <form class="form" id="expense-form">
              <fieldset class="form-block">
                <legend>예산 항목</legend>
                <div class="field">
                  <label class="required" for="title">지출 제목</label>
                  <input id="title" required placeholder="예: 홈페이지 개발 외주">
                </div>
                <div class="field">
                  <label class="required" for="business_plan_item_id">예산 항목</label>
                  <div class="amount-select" data-plan-select></div>
                  <select id="business_plan_item_id" hidden></select>

                </div>
              </fieldset>
              <fieldset class="form-block">
                <legend>지출 상세</legend>
                <div class="field">
                  <label class="required" for="vendor_name">거래처명</label>
                  <input id="vendor_name" placeholder="예: 웹스튜디오">
                </div>
                <div class="field">
                  <label class="required" for="vendor_business_number">거래처 사업자등록번호</label>
                  <input id="vendor_business_number" placeholder="000-00-00000">
                </div>
                <div class="grid grid-2">
                  <div class="field">
                    <label class="required" for="amount_supply">공급가액</label>
                    <input id="amount_supply" inputmode="numeric" data-money-input placeholder="예: 5,000,000">
                  </div>
                  <div class="field">
                    <label class="required" for="vat_amount">부가세</label>
                    <input id="vat_amount" inputmode="numeric" data-money-input placeholder="예: 500,000">
                  </div>
                </div>
                <div class="field">
                  <label class="required" for="expected_completion_date">지출 예정일자</label>
                  <input id="expected_completion_date" type="date">
                </div>
                <div class="field">
                  <label class="required" for="purpose">신청 내용</label>
                  <textarea id="purpose" placeholder="예: 시제품 홍보용 홈페이지 개발"></textarea>
                </div>
              </fieldset>
              <div class="actions">
                <button class="button secondary" name="action" value="draft" type="submit" data-action-draft>임시저장</button>
                <button class="button" name="action" value="submit" type="submit" data-action-submit>사전승인 신청</button>
              </div>
            </form>
          </section>
          <aside class="grid">
            <section class="card" data-doc-preview>
              <h2>필요 첨부 서류</h2>
              <p class="muted">예산 항목을 선택하면 필요한 첨부서류를 안내합니다.</p>
            </section>
          </aside>
        </div>
      </main>
    </div>
    <script type="module" src="../src/pages/founder/expense-new.js"></script>
  </body>
</html>
