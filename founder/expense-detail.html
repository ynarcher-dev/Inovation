<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>지출 신청 상세</title>
    <link rel="stylesheet" href="../src/styles.css">
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar"></aside>
      <main class="main">
        <div class="topbar">
          <div>
            <h1 data-title>지출 신청 상세</h1>
            <p data-status></p>
          </div>
        </div>
        <p class="error" data-error hidden></p>
        <div class="detail-layout">
          <div class="detail-main">
            <section class="card">
              <h2>신청 정보</h2>
              <div data-summary></div>
              <p class="muted" data-edit-guide style="font-size:var(--text-caption); margin-top:8px;"></p>
              <div class="actions" data-cta style="margin-top:12px;"></div>
            </section>
            <section class="card review-section" data-reviews></section>
          </div>
          <aside class="card">
            <h2>서류 제출</h2>
            <p class="muted">첨부 서류 기능은 새로 설계 중입니다.</p>
          </aside>
        </div>
      </main>
    </div>
    <script type="module" src="../src/pages/founder/expense-detail.js"></script>
  </body>
</html>
