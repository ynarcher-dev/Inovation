<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>로그인 | 사업비 집행 도우미</title>
    <link rel="stylesheet" href="../src/styles.css">
  </head>
  <body>
    <main class="login-page">
      <section class="card login-card">
        <h1>로그인</h1>

        <form class="form" id="login-form">
          <div class="field">
            <label for="email">ID 또는 이메일</label>
            <input id="email" value="admin" autocomplete="username">
          </div>
          <div class="field">
            <label for="password">비밀번호</label>
            <input id="password" type="password" value="" autocomplete="current-password">
          </div>
          <label class="checkbox-row">
            <input id="remember-me" type="checkbox">
            <span>로그인 유지</span>
          </label>
          <p class="error" data-error hidden></p>
          <div class="actions">
            <a class="button secondary" href="./signup.html">창업자 가입</a>
            <button class="button" type="submit">로그인</button>
          </div>
        </form>
      </section>
    </main>
    <script type="module" src="../src/pages/auth/login.js"></script>
  </body>
</html>
