<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>창업자 가입 | 사업비 집행 도우미</title>
    <link rel="stylesheet" href="../src/styles.css">
  </head>
  <body>
    <main class="login-page">
      <section class="card login-card">
        <h1>창업자 가입</h1>

        <form class="form" id="signup-form">
          <div class="field">
            <label class="required" for="email">이메일</label>
            <input id="email" type="email" autocomplete="email" required>
          </div>
          <div class="field">
            <label class="required" for="password">비밀번호</label>
            <input id="password" type="password" autocomplete="new-password" minlength="8" required>
            <p class="field-hint" id="password-hint">8자 이상이며 영문과 숫자를 모두 포함해야 합니다.</p>
          </div>
          <div class="field">
            <label class="required" for="password_confirm">비밀번호 확인</label>
            <input id="password_confirm" type="password" autocomplete="new-password" minlength="8" required>
          </div>
          <div class="field">
            <label class="required" for="company_name">기업명</label>
            <input id="company_name" required>
          </div>
          <div class="field">
            <label class="required" for="support_program_id">참가 사업명</label>
            <select id="support_program_id" required>
              <option value="">참가 사업을 선택하세요</option>
            </select>
          </div>
          <div class="field">
            <label class="required" for="founder_name">대표자명</label>
            <input id="founder_name" required>
          </div>
          <div class="field">
            <label class="required" for="business_number">사업자등록번호</label>
            <input id="business_number" placeholder="000-00-00000" required>
          </div>
          <div class="field">
            <label class="required" for="phone">연락처</label>
            <input id="phone" autocomplete="tel" required>
          </div>
          <p class="error" data-error hidden></p>
          <div class="actions">
            <a class="button secondary" href="./login.html">로그인으로 돌아가기</a>
            <button class="button" type="submit" data-signup-submit>가입 신청</button>
            <a class="button" data-login-after-signup hidden href="./login.html">로그인으로 이동</a>
          </div>
        </form>
      </section>
    </main>
    <script type="module" src="../src/pages/auth/signup.js"></script>
  </body>
</html>
